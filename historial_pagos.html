<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Pagos - PayPark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --text-primary: #111827;
  --accent: #066462;
  --accent2: #3AC2BF;
  --bg-light: #FAFAFA;
  --bg-white: #FFFFFF;
  --btn-bg: linear-gradient(90deg,#248786,#0e2425);
}

/* Base */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter',sans-serif; background: var(--bg-light); color: var(--text-primary); overflow-x:hidden; transition:0.3s;}
body.dark-theme { background:#111827; color:white;}

/* Header */
header {
  position: fixed; top:0; width:100%; padding:20px 50px;
  display:flex; align-items:center; justify-content:flex-start;
  background:var(--bg-white); box-shadow:0 3px 15px rgba(0,0,0,0.1); z-index:100;
}

/* Hamburguesa */
.hamburger {
  display:flex; flex-direction:column; justify-content:space-around;
  width:28px; height:22px; cursor:pointer; margin-right:20px;
}
.hamburger div { height:3px; background:var(--text-primary); border-radius:2px; transition:0.3s; }
.hamburger.active div:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.active div:nth-child(2){opacity:0;}
.hamburger.active div:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

/* Logo */
.logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--accent); }

/* Side menu */
.side-menu {
  position:fixed; top:0; left:-280px; width:260px; height:100%;
  background:var(--bg-white); padding:40px;
  transition:0.3s; box-shadow:2px 0 10px rgba(0,0,0,0.2); z-index:200;
  display:flex; flex-direction:column; gap:15px;
}
.side-menu.show { left:0; }

.side-menu a {
  display:block; font-weight:600; font-size:1rem; text-decoration:none;
  color:var(--text-primary); padding:10px 15px; border-radius:8px;
  transition:0.3s, transform 0.2s, background 0.3s, color 0.3s;
}
.side-menu a:hover {
  background: var(--btn-bg);
  color:white;
  transform: scale(1.02);
}
.side-menu a.active {
  background: var(--btn-bg);
  color:white;
  border-left:4px solid #066462;
  border-radius:8px;
  transition: background 0.3s, transform 0.2s;
}

.side-menu .close-btn { position:absolute; top:20px; right:20px; font-size:28px; cursor:pointer; color:var(--text-primary); }

/* Botón modo oscuro */
#themeToggle { position:fixed; top:15px; right:15px; font-size:25px; cursor:pointer; z-index:101; }

/* Panel */
main { padding:120px 20px 50px; display:flex; justify-content:center; }
.panel {
  background: var(--bg-white); padding:50px 40px; border-radius:25px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2); max-width:500px; width:100%;
  text-align:center; border:3px solid; border-image-slice:1;
  border-image-source:linear-gradient(90deg,var(--accent),#3AC2BF,#066462);
  animation: borderAnim 5s linear infinite;
}
@keyframes borderAnim {
  0%{border-image-source:linear-gradient(90deg,var(--accent),#3AC2BF,#066462);}
  50%{border-image-source:linear-gradient(90deg,#3AC2BF,#066462,var(--accent));}
  100%{border-image-source:linear-gradient(90deg,var(--accent),#3AC2BF,#066462);}
}
.panel h2 { margin-bottom:25px; font-size:2rem; color:var(--accent); }
input { width:100%; padding:12px; border-radius:12px; border:1px solid #d1d5db; margin-bottom:15px; font-size:15px; }
input:focus { border-color: var(--accent); box-shadow:0 0 8px rgba(58,194,191,0.5); outline:none; }
.buttons { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-top:15px; }
.btn { padding:12px 25px; border-radius:12px; font-weight:600; cursor:pointer; min-width:140px; color:white; border:none; background:var(--btn-bg); }
.btn:hover { transform:scale(1.05); box-shadow:0 6px 15px rgba(0,0,0,0.25); }

/* Footer */
footer { padding:30px; text-align:center; background:var(--text-primary); color:white; }
footer a { color:var(--accent); text-decoration:underline; }
</style>
</head>
<body>

<header>
  <div class="hamburger" onclick="toggleMenu()"><div></div><div></div><div></div></div>
  <div class="logo">PayPark</div>
</header>

<div class="side-menu" id="sideMenu">
  <div class="close-btn" onclick="toggleMenu()">✖</div>
  <a href="panel_admin.html">Inicio</a>
  <a href="#">Gestión de Tiempo</a>
  <a href="#">Gestión de Tickets</a>
  <a href="#">Historial de Pagos</a>
  <a href="#">Reportes</a>
  <a href="#">Control de Actividad</a>
  <a href="#">Perfil</a>
  <a href="index.html">Cerrar Sesión</a>
</div>

<div id="themeToggle">🌙</div>

<main>
  <div class="panel">
    <h2>Historial de Pagos</h2>
    <input type="date" placeholder="Fecha desde">
    <input type="date" placeholder="Fecha hasta">
    <div class="buttons">
      <button class="btn" onclick="alert('Filtrando historial')">Filtrar</button>
      <button class="btn" onclick="alert('Cancelado')">Cancelar</button>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 PayPark</p>
</footer>

<script>
// Toggle menú
function toggleMenu(){
  const menu = document.getElementById("sideMenu");
  menu.classList.toggle("show");
  document.querySelector(".hamburger").classList.toggle("active");
}

// Cerrar menú al hacer clic fuera
window.onclick = function(event){
  const menu = document.getElementById("sideMenu");
  const hamburger = document.querySelector(".hamburger");
  if(!menu.contains(event.target) && !hamburger.contains(event.target)){
      menu.classList.remove("show");
      hamburger.classList.remove("active");
  }
}

// Activar enlace clickeado
const menuLinks = document.querySelectorAll('#sideMenu a');
menuLinks.forEach(link => {
  link.addEventListener('click', ()=>{
    menuLinks.forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    toggleMenu();
  });
});

// Modo oscuro
const themeToggle = document.getElementById("themeToggle");
themeToggle.addEventListener("click", ()=>{
  document.body.classList.toggle("dark-theme");
  themeToggle.textContent = document.body.classList.contains("dark-theme") ? "☀️":"🌙";
});
</script>

</body>
</html>
